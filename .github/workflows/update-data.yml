name: Update data and deploy

on:
  schedule:
    - cron: "0 19 * * *"   # daily, ~05:00 Australia/Sydney
  workflow_dispatch:        # manual "Refresh now" from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write   # commit refreshed data back (keeps history.json accruing)
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the data-commit step can rebase/push

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests beautifulsoup4 lxml

      # The Natural Earth masters (~65 MB, immutable) are cached, not committed.
      - name: Cache Natural Earth masters
        uses: actions/cache@v4
        with:
          path: data/geo
          key: natural-earth-v1

      # The scraper's page cache makes daily runs incremental (~1 request when
      # nothing changed, instead of 179).
      - name: Restore scraper cache
        uses: actions/cache@v4
        with:
          path: data/updater_state.json
          key: updater-state-${{ github.run_id }}
          restore-keys: updater-state-

      - name: Fetch geo masters (skips if cached)
        run: python updater/fetch_geo.py

      - name: Build countries.geojson
        run: python updater/build_geo.py

      # NOTE: the advisory scraper is intentionally NOT run here. Smartraveller's
      # CDN read-times-out on cloud (GitHub Actions) IPs, so it can only fail -
      # and a failed run would overwrite status.json with ok=false, which the
      # UI would surface as a misleading "refresh failed" banner even though the
      # deployed advisory data is fine. Advisory data is refreshed by the local
      # Scheduled Task (updater/auto_refresh.ps1) from a residential IP, which
      # pushes and triggers this workflow to redeploy.
      #
      # Only the visa scraper runs here (Wikipedia serves cloud IPs fine), so
      # visa data stays fresh even when the local machine is off. It is
      # best-effort: a transient failure keeps the last-good visas.json.
      - name: Scrape visa requirements
        continue-on-error: true
        env:
          SCRAPER_CONTACT: ${{ secrets.SCRAPER_CONTACT }}
        run: python updater/visa_scraper.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # status.json is deliberately NOT staged: it reflects advisory-scrape
          # health, which is only meaningful from the local (residential) run.
          git add data/visas.json web/data/countries.geojson
          if git diff --cached --quiet; then
            echo "no data changes"
          else
            git commit -m "data: scheduled visa refresh"
            git pull --rebase origin main
            git push
          fi

      - name: Build static site
        run: |
          mkdir -p _site/data
          cp -r web/. _site/
          cp data/advisories.json data/visas.json data/history.json data/status.json _site/data/
          cp LICENSE DATA-LICENSES.md _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
